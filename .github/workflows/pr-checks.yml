name: PR Checks

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions: {}

jobs:
  pr-checks:
    permissions:
      contents: read
      actions: write
      pull-requests: write
      checks: write
    # trunk-ignore(pinact/unpinned-action)
    uses: McTalian-WoW-Addons/wow-build-tools/.github/workflows/pr-checks.yml@v1
    with:
      addon-name: BeaconUnitFrames
      rockspec-name: buf-1-1.rockspec
      i18n-enabled: true
      trunk-enabled: true
      wbt-ref: v1
    secrets: inherit
